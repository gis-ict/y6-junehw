<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Masterclass | Final 30-Point Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=JetBrains+Mono:wght@500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-yellow: #fff9c4; --p-blue: #bbdefb; --p-green: #b2dfdb;
            --p-coral: #ffab91; --p-purple: #e1bee7; --p-text: #2c3e50;
            --white: #ffffff; --wrong: #ff7675; --correct: #55efc4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, var(--p-yellow) 0%, var(--p-blue) 100%); background-attachment: fixed; color: var(--p-text); padding-bottom: 150px; }

        /* Landing Gate (Solves Audio Policy Bug) */
        #gate { position: fixed; inset: 0; background: var(--p-blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 450px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 4px solid white; }

        header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); padding: 15px 5%; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--p-coral); }

        /* Pinterest Masonry Grid */
        .container { column-count: 3; column-gap: 20px; max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        @media (max-width: 1000px) { .container { column-count: 2; } }
        @media (max-width: 650px) { .container { column-count: 1; } }

        .pin { display: inline-block; width: 100%; background: white; border-radius: 20px; margin-bottom: 20px; padding: 25px; break-inside: avoid; border: 1px solid #efefef; transition: 0.3s; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .pin.locked-correct { border: 3px solid var(--correct); background: #f2fffb; }
        .pin.locked-wrong { border: 3px solid var(--wrong); background: #fff5f5; }

        .code-snippet { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-bottom: 15px; border-left: 5px solid var(--p-coral); white-space: pre-wrap; line-height: 1.5; }
        
        .explanation { font-size: 0.8rem; color: #636e72; background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 12px; font-style: italic; border-left: 3px solid var(--p-yellow); }

        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; font-family: 'JetBrains Mono'; margin-bottom: 10px; outline: none; transition: 0.2s; background: white; }
        input:focus { border-color: var(--p-coral); }
        input:disabled { background: #f1f2f6; border: none; color: #7f8c8d; cursor: not-allowed; }

        .btn-clock { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: 800; background: #e60023; color: white; cursor: pointer; font-family: 'Fredoka'; transition: 0.2s; }
        .btn-clock:disabled { display: none; }

        /* Review Reveal Styles */
        .reveal-box { font-size: 0.85rem; font-weight: 600; margin-top: 10px; display: none; padding: 12px; border-radius: 12px; line-height: 1.4; animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .reveal-correct { background: #d1f7e6; color: #00b894; }
        .reveal-wrong { background: #ffe0e0; color: #d63031; }

        #score-board { position: fixed; bottom: 20px; right: 20px; background: white; border: 3px solid var(--p-coral); padding: 15px 30px; border-radius: 50px; z-index: 1000; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #submit-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 25px; text-align: center; border-top: 3px solid var(--p-green); display: none; z-index: 1001; }

        .meme { position: fixed; width: 80px; pointer-events: none; z-index: 5000; animation: floatUp 2.5s ease-out forwards; }
        @keyframes floatUp { 0% { bottom: 0; transform: scale(0.5); opacity: 1; } 100% { bottom: 100vh; transform: scale(1.5) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="gate">
        <div class="gate-card">
            <h1 style="font-family: 'Fredoka'; color: #e60023; font-size: 2.2rem;">Python Mastery Lab</h1>
            <p style="margin: 15px 0; font-size: 1.1rem; color: #576574;">Teacher: <b>Mr. Rommel</b> | Digital Technologies<br>30 Challenges. One try each. Let's Cook!</p>
            <input type="text" id="fname" placeholder="First Name" style="margin-bottom: 10px; border: 2px solid #ddd;">
            <input type="text" id="lname" placeholder="Last Name" style="margin-bottom: 20px; border: 2px solid #ddd;">
            <button class="btn-clock" onclick="unlock()" style="font-size: 1.2rem; padding: 15px;">INITIALIZE LAB</button>
        </div>
    </div>

    <!-- AUDIO SITES -->
    <audio id="snd-clock" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
    <audio id="snd-bruh" src="https://www.myinstants.com/media/sounds/bruh.mp3" preload="auto"></audio>

    <header>
        <div>
            <h1 style="font-family:'Fredoka'; color:#e60023; font-size: 1.8rem;">📍 Pin-Board Lab</h1>
            <div style="font-size:0.75rem; font-weight:800; color:#7f8c8d; letter-spacing: 1px;" id="student-name">PLAYER: WAITING...</div>
        </div>
        <div style="font-family: 'Fredoka'; font-size: 0.9rem; color: #888;">JUNE 03, 2026</div>
    </header>

    <div id="score-board">
        <div style="font-size: 0.7rem; font-weight: 800; color: #7f8c8d;">TOTAL XP</div>
        <div style="font-size: 1.8rem; font-weight: 800; color: #e60023;"><span id="score">0</span> / 30</div>
    </div>

    <div class="container" id="grid"></div>

    <div id="submit-zone">
        <p style="margin-bottom: 15px; font-weight: 800; font-size: 1.1rem;">Lab Complete! Ready to save your score?</p>
        <button class="btn-clock" style="background:#55efc4; color:#2c3e50; max-width:450px; font-size: 1.2rem; padding: 15px;" id="final-btn" onclick="sendData()">SEND RESULTS TO DRIVE 🚀</button>
    </div>

    <script>
        // !! TEACHER: PASTE YOUR GOOGLE WEB APP URL HERE !!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_1EX7Zs_bM_TwenVwJ3mnQGQxQW2HRNqp988XZtnQE3Dtnnyut9hFTbnIfuTcEIgJ2A/exec";

        const challenges = [
            { id: 0, title: "Naming Crime", exp: "Variable names cannot have spaces. Fix this variable name:", code: "player score = 10", ans: "player_score", hint: "Connect words using the underscore (_) symbol!" },
            { id: 1, title: "Modulo Remainder", exp: "Calculate the remainder of 11 divided by 2:", code: "print(11 % 2)", ans: "1", hint: "2 goes into 11 five times, with 1 left over." },
            { id: 2, title: "Power Up", exp: "What is the symbol used for Exponents (Powers)?", code: "5 __ 2 # Result is 25", ans: "**", hint: "The double asterisk (**) is the power symbol." },
            { id: 3, title: "Slice Rule", exp: "What prints from 'Slay'[0:2]? (Remember the fence post!)", code: "print('Slay'[0:2])", ans: "Sl", hint: "It stops BEFORE index 2 (Index 0 and 1 only)." },
            { id: 4, title: "Type Casting", exp: "Keyword to turn typed text into a real number:", code: "val = ____(input('Age?'))", ans: "int", hint: "int() converts strings into integers." },
            { id: 5, title: "Exact Match", exp: "Which symbol checks if two things are exactly equal?", code: "if health __ 100:", ans: "==", hint: "Single (=) stores, double (==) asks a question." },
            { id: 6, title: "Decimal Life", exp: "What is the data type for a number like 1.5?", code: "type(1.5)", ans: "float", hint: "Numbers with decimal points are floats." },
            { id: 7, title: "The Locked Vault", exp: "Which bracket type is used for a Tuple?", code: "data = __1, 2__", ans: "()", hint: "Tuples use parentheses and are read-only." },
            { id: 8, title: "Labeled Data", exp: "Which bracket type is used for a Dictionary?", code: "user = __'id': 1__", ans: "{}", hint: "Dictionaries use curly braces." },
            { id: 9, title: "The Echo", exp: "What happens when you multiply text by 3?", code: "print('Hi' * 3)", ans: "HiHiHi", hint: "String multiplication repeats the text." },
            { id: 10, title: "Indentation", exp: "How many spaces is one Python indent (Tab)?", code: "if True:\n....print('Hi')", ans: "4", hint: "Python logic blocks must be 4 spaces in." },
            { id: 11, title: "Logic Flipper", exp: "Which keyword turns True into False?", code: "print(____ True)", ans: "not", hint: "The 'not' keyword reverses logic." },
            { id: 12, title: "Floor Cleaner", exp: "Symbol that divides and ignores decimals:", code: "7 __ 2 # Result is 3", ans: "//", hint: "Double slash is Floor Division." },
            { id: 13, title: "Case Check", exp: "Correct Python spelling for 'true':", code: "val = ____", ans: "True", hint: "Booleans must start with a CAPITAL letter." },
            { id: 14, title: "String Measure", exp: "Function used to find character count:", code: "____('Hello')", ans: "len", hint: "len() is short for length." },
            { id: 15, title: "Input Default", exp: "input() always returns what type initially?", code: "val = input('?')", ans: "str", hint: "All inputs start as strings (text)." },
            { id: 16, title: "Elif Mission", exp: "Keyword used for a second 'if' check:", code: "if x: ...\n____ y:", ans: "elif", hint: "elif is short for 'else if'." },
            { id: 17, title: "Grow a List", exp: "Method to add a new item to the end:", code: "bag.____('Gold')", ans: "append", hint: "Append means add to the end." },
            { id: 18, title: "Key Access", exp: "Get 'A' from d = {'key': 'A'}:", code: "print(d[____])", ans: "'key'", hint: "You must use the Key label in brackets." },
            { id: 19, title: "Caps Transform", exp: "Method to make a string ALL CAPS:", code: "word.____()", ans: "upper", hint: ".upper() makes it shout!" },
            { id: 20, title: "Block Opening", exp: "Which symbol must end every IF line?", code: "if x > 10__", ans: ":", hint: "The colon (:) opens the block." },
            { id: 21, title: "Not Identical", exp: "Symbol for 'is NOT equal to':", code: "if x __ 0:", ans: "!=", hint: "Exclamation and equal mark means not equal." },
            { id: 22, title: "Change Check", exp: "Can you change a Tuple after it is made? (Yes/No)", code: "t = (1, 2)\nt[0] = 5", ans: "no", hint: "Tuples are locked in stone (immutable)." },
            { id: 23, title: "Unique Logic", exp: "Which container removes duplicates automatically?", code: "x = {1, 1, 2}", ans: "set", hint: "Sets only store unique values." },
            { id: 24, title: "The Escape", exp: "Escape character for a NEW LINE:", code: "print('A____B')", ans: "\\n", hint: "Backslash n starts a new line." },
            { id: 25, title: "Var Plugin", exp: "Letter used to create an f-string:", code: "____'Hello {n}'", ans: "f", hint: "F goes before the quotes." },
            { id: 26, title: "String Cast", exp: "Turn number 10 into string '10':", code: "____(10)", ans: "str", hint: "str() turns items into text." },
            { id: 27, title: "Even Logic", exp: "What is 10 % 2? (Perfect division check)", code: "print(10 % 2)", ans: "0", hint: "Even numbers have zero remainder." },
            { id: 28, title: "Start Count", exp: "The first index number in any list:", code: "my_list[____]", ans: "0", hint: "Computers start counting at zero." },
            { id: 29, title: "Catch-All", exp: "Does 'else' take its own condition check?", code: "else x < 5:", ans: "no", hint: "Else is for everything else; it needs no check!" }
        ];

        let score = 0;
        let answeredCount = 0;
        let userData = { firstName: "", lastName: "" };

        function unlock() {
            userData.firstName = document.getElementById('fname').value.trim();
            userData.lastName = document.getElementById('lname').value.trim();
            if (userData.firstName && userData.lastName) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('student-name').innerText = `CODER: ${userData.firstName.toUpperCase()} ${userData.lastName.toUpperCase()}`;
                
                // Solve Audio policy: Trigger sounds briefly
                const s = document.getElementById('snd-clock');
                const b = document.getElementById('snd-bruh');
                s.play().then(() => s.pause());
                b.play().then(() => b.pause());
                
                buildGrid();
            } else { alert("Names required, no cap!"); }
        }

        function buildGrid() {
            const grid = document.getElementById('grid');
            challenges.forEach((q, idx) => {
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.id = `pin-${idx}`;
                pin.innerHTML = `
                    <div class="explanation">Challenge #${idx + 1}</div>
                    <h3 style="color:#e60023">${q.title}</h3>
                    <p style="font-size:0.85rem; color:#636e72">${q.exp}</p>
                    <div class="code-snippet">${q.code}</div>
                    <input type="text" id="in-${idx}" placeholder="Type fix...">
                    <button class="btn-clock" id="btn-${idx}" onclick="verify(${idx})">CLOCK IT!</button>
                    <div class="reveal-box" id="rev-${idx}"></div>
                `;
                grid.appendChild(pin);
            });
        }

        function verify(idx) {
            const q = challenges[idx];
            const input = document.getElementById(`in-${idx}`);
            const btn = document.getElementById(`btn-${idx}`);
            const pin = document.getElementById(`pin-${idx}`);
            const rev = document.getElementById(`rev-${idx}`);
            const userVal = input.value.trim().toLowerCase().replace(/\s/g, '');
            const correctVal = q.ans.toLowerCase().replace(/\s/g, '');

            input.disabled = true;
            btn.disabled = true;
            answeredCount++;

            if (userVal === correctVal) {
                document.getElementById('snd-clock').currentTime = 0;
                document.getElementById('snd-clock').play();
                pin.classList.add('locked-correct');
                rev.innerHTML = `✨ SLAY! <br> ${q.hint}`;
                rev.className = "reveal-box reveal-correct";
                rev.style.display = "block";
                score++;
                document.getElementById('score').innerText = score;
                spawnMemes('slay');
            } else {
                document.getElementById('snd-bruh').currentTime = 0;
                document.getElementById('snd-bruh').play();
                pin.classList.add('locked-wrong');
                rev.innerHTML = `💀 COOKED. Answer was: <b>${q.ans}</b> <br> ${q.hint}`;
                rev.className = "reveal-box reveal-wrong";
                rev.style.display = "block";
                spawnMemes('sus');
            }

            if(answeredCount === challenges.length) {
                document.getElementById('submit-zone').style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        function spawnMemes(type) {
            const urls = type === 'slay' ? 
                ['https://em-content.zobj.net/source/apple/354/sparkles_2728.png', 'https://em-content.zobj.net/source/apple/354/nail-polish_1f485.png'] :
                ['https://em-content.zobj.net/source/apple/354/skull_1f480.png', 'https://em-content.zobj.net/source/apple/354/face-with-monocle_1f9d0.png'];
            
            for(let i=0; i<12; i++) {
                const img = document.createElement('img');
                img.src = urls[Math.floor(Math.random() * urls.length)];
                img.className = 'meme';
                img.style.left = Math.random() * 85 + "vw";
                document.body.appendChild(img);
                setTimeout(() => img.remove(), 2500);
            }
        }

        async function sendData() {
            const finalBtn = document.getElementById('final-btn');
            finalBtn.disabled = true;
            finalBtn.innerText = "UPLOADING TO DRIVE... 🍳";

            const payload = {
                firstName: userData.firstName,
                lastName: userData.lastName,
                score: score
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert("W! Your score has been recorded in the Google Sheet. Mission Accomplished.");
                finalBtn.innerText = "MISSION COMPLETE ✅";
                finalBtn.style.background = "#bdc3c7";
            } catch (e) {
                alert("Network Error! Screenshot your final score and email it to Mr. Rommel.");
                finalBtn.disabled = false;
                finalBtn.innerText = "RETRY SENDING";
            }
        }
    </script>
</body>
</html>
